# Qwen 3.5 0.8B Quick Test Config (Continued Pretraining)
#
# Full model (24 layers, no num_layers override — required for loading
# pretrained checkpoint) with only 100 steps for smoke testing.
# Verifies: model loads, pad_idx check passes, data loads, loss computes.
#
# NOTE: Cannot reduce num_layers for continued pretraining because the
# checkpoint has 24 layers of weights that must match the model architecture.
#
# Usage:
#   source ~/envs/fs081-pt290-cu128/bin/activate
#   cd /storage/home/yunchaoyang1/fairseq2
#   torchrun --standalone --nproc_per_node=1 -m recipes.lm.train \
#     --config-file recipes/lm/train/configs/test_qwen35_0.8b.yaml \
#     /tmp/qwen35_test

model:
  name: qwen35_0.8b
  dtype: bfloat16
  mmap: false
  compile: false
  compile_options:
    fullgraph: false
    dynamic: false
    mode: default
    backend: inductor
    backend_options: null

dataset:
  name: null
  family: lm_train
  config_overrides:
    sources:
      - path: /checkpoint/smallomnillm/shared/data/fineweb-edu/jsonl/10BT
        weight: 1.0
  max_seq_len: 512
  max_num_tokens: 2048
  prefetch: 4
  sync_ranks: false

tokenizer:
  name: qwen35_0.8b
  path: null
  family: null
  config_overrides: null

gang:
  tensor_parallel_size: 1
  timeout: 15
  high_priority: true

trainer:
  data_parallelism: fsdp
  fsdp:
    version: v2
    granularity: layer
    hybrid: false
    reshard_after_forward: true
    fp32_reduce: true
  mixed_precision:
    mode: static
    dtype: bfloat16
  grad_accumulation:
    num_batches: 1
    no_sync: false
  activation_checkpointing:
    mode: off
    every_nth_layer: 1
  max_grad_norm: 1.0
  fp16_loss_scale:
  - 128.0
  - 0.0001
  gc_every_n_steps: 1000
  grad_check: false
  anomaly_detection: false

optimizer:
  name: adamw
  config:
    lr: 5.0e-5
    betas:
    - 0.9
    - 0.95
    eps: 1.0e-8
    weight_decay: 0.1
    amsgrad: false
    maximize: false
    capturable: false
    differentiable: false
    impl: fused
    groups: []

lr_scheduler:
  name: cosine_annealing
  config:
    cycle_len: null
    num_warmup_steps: 10
    cycle_mul: 1.0
    lr_mul: 1.0
    start_lr: 1.0e-30
    final_lr: null
    final_lr_scale: 0.01

regime:
  num_steps: 100
  num_data_epochs: null
  validate_at_start: false
  validate_after_n_steps: 0
  validate_every_n_steps: 4000
  validate_after_n_data_epochs: 0
  validate_every_n_data_epochs: null
  score_metric: null
  checkpoint_after_n_steps: 0
  checkpoint_every_n_steps: 50
  checkpoint_after_n_data_epochs: 0
  checkpoint_every_n_data_epochs: null
  save_model_only: all_but_last
  export_hugging_face: false
  keep_last_n_checkpoints: 2
  keep_best_n_checkpoints: null
  keep_checkpoint_every_n_steps: null
  publish_metrics_after_n_steps: 0
  publish_metrics_every_n_steps: 1
  publish_metrics_after_n_data_epochs: 0
  publish_metrics_every_n_data_epochs: null

common:
  torch:
    num_threads: null
    allow_tf32: true
    fp16_reduced_precision: true
    bf16_reduced_precision: true
    default_sdpa: torch
    compiled_region_activation_memory_budget: 0.9
  metric_recorders:
    tensorboard:
      enabled: false
    wandb:
      enabled: false
  profilers:
    torch:
      enabled: false
      skip_n_steps: 4
      wait_n_steps: 0
      num_warmup_steps: 1
      num_active_steps: 4
      repeat: 1
  assets:
    extra_paths: []
    prev_checkpoint_dir: null
  seed: 2
  debug: false
  cluster: auto
  no_sweep_dir: false
  sweep_format: ws_{world_size}.{hash}
