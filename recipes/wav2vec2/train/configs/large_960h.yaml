model:
  _set_:
  - arch: "large"
  - encoder_config: { first_pass_dropout_p: 0.1 }


dataset:
  _set_:
  - max_audio_len: 320_000
  - max_num_elements: 1_200_000

optimizer:
  _set_:
  - lr: 3e-04

lr_scheduler:
  _set_:
  - num_warmup_steps: 20_000

regime:
  _set_:
  - num_steps: 250_000
  - publish_metrics_every_n_steps: 100
